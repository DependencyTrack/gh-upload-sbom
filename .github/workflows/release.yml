name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump for this release'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions: { }

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # Required to push commits and create releases.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump version, rebuild dist and tag
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          TAG="$(npm version "${BUMP}" -m "release: %s" | tail -n1)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "major=${TAG%%.*}" >> "$GITHUB_OUTPUT"
          echo "minor=${TAG%.*}" >> "$GITHUB_OUTPUT"
      - name: Push version commit and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          MAJOR: ${{ steps.version.outputs.major }}
          MINOR: ${{ steps.version.outputs.minor }}
        run: |
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -f "${MAJOR}" "${TAG}"
          git tag -f "${MINOR}" "${TAG}"
          git push "${REMOTE}" "HEAD:${GITHUB_REF_NAME}" "${TAG}"
          git push --force "${REMOTE}" "${MAJOR}" "${MINOR}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "${TAG}" --verify-tag --generate-notes
