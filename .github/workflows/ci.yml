name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag=v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run NPM Audit
        run: npm audit --audit-level=high
      - name: Run build
        run: npm run build
      - name: Verify dist/ is up to date
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi
