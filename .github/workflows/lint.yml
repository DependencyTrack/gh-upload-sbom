name: Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-gha:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Public repo: only the SARIF upload needs a scope. A private repo would
      # additionally require contents:read and actions:read.
      security-events: write # Required to upload zizmor SARIF results.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # tag=v0.5.6
